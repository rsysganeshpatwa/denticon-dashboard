version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: denticon-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=denticon
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=denticon_password_2024
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./denticon-api-node/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - denticon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  denticon-api:
    build:
      context: ./denticon-api-node
      dockerfile: Dockerfile
    container_name: denticon-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=denticon
      - DB_USER=postgres
      - DB_PASSWORD=denticon_password_2024
    volumes:
      - ./denticon-api-node:/app
      - /app/node_modules
    command: npx nodemon server.js
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - denticon-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React Service
  denticon-dashboard:
    build:
      context: ./denticon-dashboard
      dockerfile: Dockerfile
    container_name: denticon-dashboard
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - denticon-api
    networks:
      - denticon-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: denticon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - denticon-api
      - denticon-dashboard
    networks:
      - denticon-network
    volumes:
      - ./nginx/logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # pgAdmin - Database Management Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: denticon-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@denticon.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - denticon-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

networks:
  denticon-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local
